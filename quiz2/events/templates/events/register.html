<!DOCTYPE html>
<html>
<head>
    <title>Event Registration</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container{
            background: white;
            width: 400px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        form p{
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        label{
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input{
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus{
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 5px rgba(79,172,254,0.5);
        }

        .btn{
            width: 100%;
            padding: 12px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover{
            background: #2196f3;
        }

        .errorlist{
            color: red;
            list-style: none;
            padding: 0;
            margin-top: 5px;
            font-size: 13px;
        }

    </style>
</head>

<body>

    <div class="container">

        <h2>Event Registration</h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn">
                Register
            </button>

        </form>

    </div>

</body>
</html>
