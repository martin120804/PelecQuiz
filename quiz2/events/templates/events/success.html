<!DOCTYPE html>
<html>
<head>
    <title>Success</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #56ab2f, #a8e063);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .success-box{
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        h2{
            color: #2e7d32;
        }

        p{
            color: #555;
        }

        a{
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            background: #56ab2f;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
        }

        a:hover{
            background: #388e3c;
        }
    </style>
</head>

<body>

    <div class="success-box">

        <h2>Registration Successful!</h2>

        <p>You have successfully registered for the event.</p>

        <a href="/events/">Register Again</a>

    </div>

</body>
</html>
